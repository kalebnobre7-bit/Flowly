<!DOCTYPE html>

    <script>
        window.onerror = function (msg, url, line, col, error) {
            // Se der erro critico, alertar (ajuda a debugar telas pretas no mobile)
            // Mas apenas se o app container estiver vazio apos carregamento
            setTimeout(() => {
                if (document.getElementById('weekGrid').innerHTML === '' && document.getElementById('todayView').innerHTML === '') {
                    console.error("Critical Error:", msg);
                    // alert("Erro ao carregar app: " + msg); // Opcional, remove se atrapalhar
                }
            }, 2000);
        };
    </script>

    <script src="https://cdn.tailwindcss.com" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>

<body class="safe-area-bottom">
    <div class="app-shell">
        <aside id="appSidebar" class="app-sidebar hidden-mobile">
            <div class="sidebar-top">
                <button id="sidebarToggle" class="sidebar-toggle utility-btn" type="button" aria-label="Recolher barra lateral">
                    <i data-lucide="panel-left-close" style="width: 18px; height: 18px;"></i>
                </button>
                <div class="sidebar-brand">
                    <div class="sidebar-brand-mark">
                        <img src="lightning.svg" alt="Flowly">
                    </div>
                    <div class="sidebar-brand-copy">
                        <strong>Flowly</strong>
                        <span>Sistema operacional</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button id="btnToday" class="sidebar-nav-btn active" data-flowly-view="today">
                    <i data-lucide="sun-medium" style="width: 18px; height: 18px;"></i>
                    <span>Hoje</span>
                </button>
                <button id="btnWeek" class="sidebar-nav-btn" data-flowly-view="week">
                    <i data-lucide="calendar-range" style="width: 18px; height: 18px;"></i>
                    <span>Semana</span>
                </button>
                <button id="btnMonth" class="sidebar-nav-btn" data-flowly-view="month">
                    <i data-lucide="calendar-days" style="width: 18px; height: 18px;"></i>
                    <span>Mês</span>
                </button>
                <button id="btnAnalytics" class="sidebar-nav-btn" data-flowly-view="analytics">
                    <i data-lucide="chart-column" style="width: 18px; height: 18px;"></i>
                    <span>Analytics</span>
                </button>
                <button id="btnFinance" class="sidebar-nav-btn" data-flowly-view="finance">
                    <i data-lucide="wallet" style="width: 18px; height: 18px;"></i>
                    <span>Finanças</span>
                </button>
                <button id="btnProjects" class="sidebar-nav-btn" data-flowly-view="projects">
                    <i data-lucide="briefcase-business" style="width: 18px; height: 18px;"></i>
                    <span>Projetos</span>
                </button>
                <button id="btnSexta" class="sidebar-nav-btn" data-flowly-view="sexta">
                    <i data-lucide="sparkles" style="width: 18px; height: 18px;"></i>
                    <span>Sexta</span>
                </button>
            </nav>



            <div class="sidebar-footer">
                <button id="btnSettings" class="sidebar-nav-btn sidebar-nav-btn--ghost" data-flowly-view="settings">
                    <i data-lucide="settings-2" style="width: 18px; height: 18px;"></i>
                    <span>Ajustes</span>
                </button>
            </div>
        </aside>

        <main class="app-main">
        <!-- Week Navigation (Controls) -->
        <div id="weekNav" class="hidden flowly-page-header">
            <div class="flowly-page-header__title">
                <h1>Semana</h1>
                <p class="flowly-page-header__subtitle" id="weekLabel">Semana Atual</p>
            </div>
            <div class="flowly-page-header__actions">
                <button id="btnPrevWeek" class="flowly-btn flowly-btn--ghost flowly-btn--icon flowly-btn--sm" data-week-nav="-1" title="Semana anterior"><i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i></button>
                <button id="btnCurrentWeek" class="flowly-btn flowly-btn--ghost flowly-btn--sm" data-week-nav="current">Semana Atual</button>
                <button id="btnNextWeek" class="flowly-btn flowly-btn--ghost flowly-btn--icon flowly-btn--sm" data-week-nav="1" title="Próxima semana"><i data-lucide="chevron-right" style="width: 16px; height: 16px;"></i></button>
                <button id="btnSmartWeekToggle" class="flowly-btn flowly-btn--ghost flowly-btn--icon flowly-btn--sm" title="Foco de 5 Dias" onclick="toggleSmartWeek()">
                    <i data-lucide="zap" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div id="contentArea">
            <div id="monthView" class="hidden"></div>
            <!-- Week Grid: Original structure was grid-cols-7, handled by CSS -->
            <div id="weekGrid" class="grid gap-0"></div>
            <div id="routineView" class="hidden"></div>
            <div id="analyticsView" class="hidden"></div>
            <div id="financeView" class="hidden"></div>
            <div id="projectsView" class="hidden"></div>
            <div id="sextaView" class="hidden"></div>
            <div id="settingsView" class="hidden"></div>
            <div id="todayView" class="hidden"></div>
        </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation (New Feature - Kept) -->
    <nav
        class="md:hidden fixed bottom-0 left-0 right-0 z-40 flowly-bottom-nav pb-[env(safe-area-inset-bottom)]">
        <div class="flex justify-around items-center h-16 px-2">
            <button id="btnMobileWeek" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="week">
                <i data-lucide="calendar" class="w-6 h-6"></i>
            </button>
            <button id="btnMobileAnalytics" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="analytics">
                <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
            </button>
            <button id="btnMobileFinance" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="finance">
                <i data-lucide="wallet" class="w-6 h-6"></i>
            </button>
            <button id="btnMobileProjects" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="projects">
                <i data-lucide="briefcase-business" class="w-6 h-6"></i>
            </button>
            <button id="btnMobileToday" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="today">
                <i data-lucide="sun" class="w-6 h-6"></i>
            </button>
            <button id="btnMobileSexta" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="sexta">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </button>
            <button id="btnMobileSettings" class="mobile-nav-btn flex flex-col items-center justify-center w-12 h-12 text-gray-500 transition-colors" data-flowly-view="settings">
                <i data-lucide="settings-2" class="w-6 h-6"></i>
            </button>
        </div>
    </nav>

    <!-- Floating Action Button (FAB) - Enhanced for Mobile -->


    <!-- Original Quick Menu (Restored Structure) -->
    <div id="quickAddMenu" class="context-menu"
        style="position: fixed; bottom: 100px; right: 32px; min-width: 200px; flex-direction: column; gap: 4px; display: none;">
        <div class="quick-add-option p-2 rounded cursor-pointer text-sm flex items-center gap-2"
            data-type="routine"><i data-lucide="repeat" style="width: 16px; height: 16px;"></i> Rotina Diaria
        </div>
        <div class="quick-add-option p-2 rounded cursor-pointer text-sm flex items-center gap-2"
            data-type="weekly"><i data-lucide="calendar" style="width: 16px; height: 16px;"></i> Tarefa Semanal
        </div>
        <div class="quick-add-option p-2 rounded cursor-pointer text-sm flex items-center gap-2"
            data-type="custom"><i data-lucide="plus" style="width: 16px; height: 16px;"></i> Tarefa Avulsa
        </div>
    </div>

    <!-- Modals (Restored original Auth structure for app.js compatibility) -->
    <div id="authModal" class="modal-overlay" style="z-index: 9999;">
        <div class="modal-content" style="max-width: 400px;" id="authBox">
            <h2 class="text-xl font-bold mb-4 text-center">Login / Cadastro</h2>
            <div id="authMessage"></div>

            <div id="authLogin">
                <input type="email" id="loginEmail" class="task-input mb-3" placeholder="Email">
                <input type="password" id="loginPassword" class="task-input mb-3" placeholder="Senha">
                <label class="mb-4 flex items-center gap-2 text-sm text-gray-300 cursor-pointer select-none">
                    <input type="checkbox" id="keepLoggedIn" checked class="h-4 w-4 rounded border-white/20 bg-white/5">
                    <span>Manter conectado neste dispositivo</span>
                </label>
                <button id="btnLogin" class="btn-primary mb-3">Entrar</button>
                <button id="btnShowSignup" class="btn-secondary">Criar conta</button>
            </div>

            <div id="authSignup" style="display:none;">
                <input type="email" id="signupEmail" class="task-input mb-3" placeholder="Email">
                <input type="password" id="signupPassword" class="task-input mb-4"
                    placeholder="Senha (min. 6 caracteres)">
                <button id="btnSignup" class="btn-primary mb-3">Cadastrar</button>
                <button id="btnShowLogin" class="btn-secondary">Voltar</button>
            </div>

            <button id="btnCloseAuthModal" data-auth-modal="close"
                class="absolute top-4 right-4 p-2 text-gray-500 hover:text-white"><i data-lucide="x"
                    class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- Edit Context Menu (Restored) -->
    <div id="editToolbar" class="context-menu">
        <button class="toolbar-btn" data-action="bold"><i data-lucide="bold"
                style="width: 16px; height: 16px;"></i></button>
        <button class="toolbar-btn" data-action="italic"><i data-lucide="italic"
                style="width: 16px; height: 16px;"></i></button>
        <div style="width: 1px; background: #333; margin: 0 4px;"></div>
        <button class="toolbar-btn" data-action="color"><i data-lucide="palette"
                style="width: 16px; height: 16px;"></i></button>
        <button class="toolbar-btn" data-action="habit"><i data-lucide="repeat"
                style="width: 16px; height: 16px;"></i></button>
        <div style="width: 1px; background: #333; margin: 0 4px;"></div>
        <button class="toolbar-btn" data-action="delete" style="color: var(--accent-red)"><i data-lucide="trash-2"
                style="width: 16px; height: 16px;"></i></button>
    </div>

    <!-- Color Menu -->
    <div id="colorMenu" class="context-menu" style="display: none; grid-template-columns: repeat(5, 1fr); gap: 8px;">
        <div class="color-swatch flowly-color-swatch" data-color="default"></div>

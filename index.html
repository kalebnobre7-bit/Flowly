    <!-- Boot error reporter: detecta tela preta no mobile, loga contexto rico para debug. -->
    <script>
        window.addEventListener('error', function (event) {
            // Aguarda 2s para garantir que o app teve chance de renderizar antes de classificar como falha crítica.
            setTimeout(function () {
                var weekGrid = document.getElementById('weekGrid');
                var todayView = document.getElementById('todayView');
                var weekEmpty = !weekGrid || weekGrid.innerHTML === '';
                var todayEmpty = !todayView || todayView.innerHTML === '';
                if (weekEmpty && todayEmpty) {
                    console.error('[Flowly:boot] Falha crítica de inicialização:', {
                        message: event && event.message,
                        source: event && event.filename,
                        line: event && event.lineno,
                        col: event && event.colno,
                        userAgent: navigator.userAgent
                    });
                }
            }, 2000);
        });
        window.addEventListener('unhandledrejection', function (event) {
            console.error('[Flowly:unhandledrejection]', event && event.reason);
        });
    </script>

    <!-- Modals (Restored original Auth structure for app.js compatibility) -->
    <div id="authModal" class="modal-overlay" style="z-index: 9999;" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">

            <h2 class="text-xl font-bold mb-4 text-center" id="authModalTitle">Login / Cadastro</h2>

            <div id="authLogin">

                <input type="email" id="loginEmail" class="task-input mb-3" placeholder="Email" autocomplete="email">
                <label class="sr-only" for="loginPassword">Senha</label>
                <input type="password" id="loginPassword" class="task-input mb-3" placeholder="Senha" autocomplete="current-password">

                    <span>Manter conectado neste dispositivo</span>
                </label>
                <button id="btnLogin" class="btn-primary mb-3" type="button">Entrar</button>
                <button id="btnShowSignup" class="btn-secondary" type="button">Criar conta</button>
            </div>

            <div id="authSignup" style="display:none;">
                <label class="sr-only" for="signupEmail">Email</label>
                <input type="email" id="signupEmail" class="task-input mb-3" placeholder="Email" autocomplete="email">
                <label class="sr-only" for="signupPassword">Senha (mínimo 6 caracteres)</label>
                <input type="password" id="signupPassword" class="task-input mb-4"
                    placeholder="Senha (min. 6 caracteres)" autocomplete="new-password" minlength="6">
                <button id="btnSignup" class="btn-primary mb-3" type="button">Cadastrar</button>
                <button id="btnShowLogin" class="btn-secondary" type="button">Voltar</button>
            </div>

            <button id="btnCloseAuthModal" data-auth-modal="close" aria-label="Fechar"
